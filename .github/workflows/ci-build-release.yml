name: Build & Release

on:
  push:
    branches:
      - main
    paths:
      - "Cargo.toml"
      - "src/**"
  pull_request_target:
    paths:
      - "Cargo.toml"
      - "src/**"
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_NET_GIT_FETCH_WITH_CLI: true

jobs:
  generate_version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          
      - name: Get version from Cargo.toml
        id: cargo_version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | awk -F '"' '{print $2}')
          echo "cargo_version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Found Cargo version: $VERSION"
          
      - name: Generate build version with metadata
        id: version
        run: |
          # 获取提交次数用于构建号
          BUILD_NUMBER=$(git rev-list --count HEAD)
          CARGO_VERSION="${{ steps.cargo_version.outputs.cargo_version }}"
          
          # 使用 +build. 作为元数据 (符合 SemVer 规范)
          FULL_VERSION="${CARGO_VERSION}+build.${BUILD_NUMBER}"
          
          echo "version=$FULL_VERSION" >> $GITHUB_OUTPUT
          echo "tag=v${FULL_VERSION}" >> $GITHUB_OUTPUT
          
          echo "📦 Cargo.toml version: $CARGO_VERSION"
          echo "🔢 Git commit count: $BUILD_NUMBER"
          echo "✨ Generated version: $FULL_VERSION"
          echo "🏷️ Generated tag: v$FULL_VERSION"

  build:
    runs-on: ${{ matrix.platform.runner }}
    needs: generate_version
    strategy:
      matrix:
        platform:
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x86_64
            ext: dll
          - runner: macos-latest
            target: x86_64-apple-darwin
            label: macos-x86_64
            ext: dylib
          - runner: macos-latest
            target: aarch64-apple-darwin
            label: macos-aarch64
            ext: dylib

    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2

      - name: Rustup add target
        run: rustup target add ${{ matrix.platform.target }}

      - name: Build target
        run: cargo build --release --target ${{ matrix.platform.target }}

      - name: Rename output files (Windows)
        if: matrix.platform.runner == 'windows-latest'
        shell: pwsh
        run: |
          cd target/${{ matrix.platform.target }}/release/
          Get-ChildItem -Filter "*.${{ matrix.platform.ext }}" | ForEach-Object {
            $newName = "meme-emoji-${{ matrix.platform.label }}" + $_.Extension
            Rename-Item $_.Name $newName
            Write-Host "Renamed to: $newName"
          }

      - name: Rename output files (Unix)
        if: matrix.platform.runner != 'windows-latest'
        run: |
          cd target/${{ matrix.platform.target }}/release/
          for file in *.${{ matrix.platform.ext }}; do
            if [ -f "$file" ]; then
              # 移除 lib 前缀，使用连字符风格
              new_name="meme-emoji-${{ matrix.platform.label }}.${file##*.}"
              mv "$file" "$new_name"
              echo "Renamed to: $new_name"
            fi
          done

      - uses: actions/upload-artifact@v6
        with:
          name: "meme-emoji-${{ matrix.platform.label }}"
          path: |
            target/${{ matrix.platform.target }}/release/meme-emoji-${{ matrix.platform.label }}.*

  build_linux:
    runs-on: ${{ matrix.platform.runner }}
    container: ${{ matrix.platform.container }}
    needs: generate_version
    strategy:
      matrix:
        platform:
          - runner: ubuntu-latest
            container: ghcr.io/memecrafters/meme-generator-build-container:latest
            target: x86_64-unknown-linux-gnu
            label: linux-x86_64
            ext: so
          - runner: ubuntu-24.04-arm
            container: ghcr.io/memecrafters/meme-generator-build-container:arm64
            target: aarch64-unknown-linux-gnu
            label: linux-aarch64
            ext: so

    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2

      - name: Rustup add target
        run: rustup target add ${{ matrix.platform.target }}

      - name: Build target
        run: cargo build --release --target ${{ matrix.platform.target }}

      - name: Rename output files
        run: |
          cd target/${{ matrix.platform.target }}/release/
          for file in *.${{ matrix.platform.ext }}; do
            if [ -f "$file" ]; then
              # 移除 lib 前缀，使用连字符风格
              new_name="meme-emoji-${{ matrix.platform.label }}.${file##*.}"
              mv "$file" "$new_name"
              echo "Renamed to: $new_name"
            fi
          done

      - uses: actions/upload-artifact@v6
        with:
          name: "meme-emoji-${{ matrix.platform.label }}"
          path: |
            target/${{ matrix.platform.target }}/release/meme-emoji-${{ matrix.platform.label }}.*

  build_android:
    runs-on: ${{ matrix.platform.runner }}
    container: ${{ matrix.platform.container }}
    needs: generate_version
    strategy:
      matrix:
        platform:
          - runner: ubuntu-latest
            container: ghcr.io/memecrafters/meme-generator-build-container:android
            target: aarch64-linux-android
            label: android-aarch64
            ext: so

    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2

      - name: Rustup add target
        run: rustup target add ${{ matrix.platform.target }}

      - name: Build target
        run: cargo build --release --target ${{ matrix.platform.target }}

      - name: Rename output files
        run: |
          cd target/${{ matrix.platform.target }}/release/
          for file in *.${{ matrix.platform.ext }}; do
            if [ -f "$file" ]; then
              # 移除 lib 前缀，使用连字符风格
              new_name="meme-emoji-${{ matrix.platform.label }}.${file##*.}"
              mv "$file" "$new_name"
              echo "Renamed to: $new_name"
            fi
          done

      - uses: actions/upload-artifact@v6
        with:
          name: "meme-emoji-${{ matrix.platform.label }}"
          path: |
            target/${{ matrix.platform.target }}/release/meme-emoji-${{ matrix.platform.label }}.*

  release:
    name: Create Release
    needs: [generate_version, build, build_linux, build_android]
    runs-on: ubuntu-latest
    # 允许 push 到 main 或手动触发时创建 Release
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'workflow_dispatch'
    
    permissions:
      contents: write
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          
      - name: List all downloaded files
        run: |
          echo "📂 Downloaded artifacts:"
          find artifacts -type f -name "*" | sort
          
      - name: Display version info
        run: |
          echo "🎯 Creating release with:"
          echo "   Version: ${{ needs.generate_version.outputs.version }}"
          echo "   Tag: ${{ needs.generate_version.outputs.tag }}"
        
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.generate_version.outputs.tag }}
          name: Release ${{ needs.generate_version.outputs.version }}
          body: |
            ## 🚀 构建信息
            - **版本**: `${{ needs.generate_version.outputs.version }}`
            
            这是一个自动构建的 Release，包含以下平台的动态库：
            - 🪟 Windows (x86_64)
            - 🍎 macOS (Intel)
            - 🍏 macOS (Apple Silicon)
            - 🐧 Linux (x86_64)
            - 🐧 Linux (ARM64)
            - 📱 Android (ARM64)
            
            ## 📦 文件列表
            - `meme-emoji-windows-x86_64.dll` - Windows 动态链接库
            - `meme-emoji-macos-x86_64.dylib` - macOS Intel 动态库
            - `meme-emoji-macos-aarch64.dylib` - macOS Apple Silicon 动态库
            - `meme-emoji-linux-x86_64.so` - Linux x86_64 动态库
            - `meme-emoji-linux-aarch64.so` - Linux ARM64 动态库
            - `meme-emoji-android-aarch64.so` - Android ARM64 动态库
            
            ## 🔍 版本说明
            版本号格式: `{Cargo版本}+build.{构建号}`
            - 构建号基于 Git 提交次数自动生成
            - 符合语义化版本规范 (SemVer)
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/**/meme-emoji-windows-x86_64.*
            artifacts/**/meme-emoji-macos-x86_64.*
            artifacts/**/meme-emoji-macos-aarch64.*
            artifacts/**/meme-emoji-linux-x86_64.*
            artifacts/**/meme-emoji-linux-aarch64.*
            artifacts/**/meme-emoji-android-aarch64.*